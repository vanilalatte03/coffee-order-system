name: CI

"on":
  pull_request:
    branches:
      - develop
      - main
  push:
    branches:
      - develop
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: verify
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 소스 체크아웃
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: JDK 21 설정
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: "21"

      - name: Gradle 설정
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
        with:
          cache-provider: basic

      - name: PR 공백 오류 검사
        if: github.event_name == 'pull_request'
        run: git diff --check "${{ github.event.pull_request.base.sha }}...${{ github.event.pull_request.head.sha }}"

      - name: Phase Issue 자동 실행 스킬 테스트 의존성 설치
        run: python3 -m pip install --disable-pip-version-check --no-input --requirement .agents/skills/phase-issue-autopilot/requirements-test.txt

      - name: Phase Issue 자동 실행 스킬 회귀 테스트
        run: python3 -m unittest discover -s .agents/skills/phase-issue-autopilot/tests -p "test_*.py"

      - name: 포맷, 테스트와 빌드 검증
        run: ./gradlew --no-daemon clean build

      - name: 실패 테스트 리포트 업로드
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: test-reports-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            build/reports/tests/
            build/test-results/
          if-no-files-found: ignore
          retention-days: 7
