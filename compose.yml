services:
  mysql:
    image: mysql:8.0.42
    container_name: coffee-order-mysql
    ports:
      - "3307:3306"
    environment:
      MYSQL_DATABASE: coffee_order
      MYSQL_USER: ${DB_USERNAME:-coffee}
      MYSQL_PASSWORD: ${DB_PASSWORD:-coffee}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mysqladmin ping -h 127.0.0.1 -u$${MYSQL_USER} -p$${MYSQL_PASSWORD} --silent",
        ]
      interval: 2s
      timeout: 3s
      retries: 30
      start_period: 10s
